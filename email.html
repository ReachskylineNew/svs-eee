<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Enquiry - EEE Department</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Email Logic -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="email.js"></script>

    <style>
        :root {
            --primary: #003366;
            --accent: #ffcc00;
            --text: #333;
            --bg: #f4f7f9;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .form-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            color: var(--primary);
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-group textarea {
            height: 100px;
            resize: none;
        }

        .form-group input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background: #002244;
            transform: translateY(-2px);
        }

        /* Success & Error Styles */
        #status {
            margin-top: 20px;
            display: none;
        }

        .loading {
            opacity: 0.7;
            cursor: wait;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading .spinner {
            display: block;
        }

        .loading .btn-text {
            display: none;
        }
    </style>
</head>

<body>

    <div class="form-container">
        <h2 id="formTitle"><i class="fa-solid fa-paper-plane"></i> Send Admission Enquiry</h2>

        <form id="contact-form">
            <div class="form-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" name="from_name" placeholder="Full Name" required>
            </div>

            <div class="form-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" name="reply_to" placeholder="Email Address" required>
            </div>

            <div class="form-group">
                <i class="fa-solid fa-phone"></i>
                <input type="tel" name="phone_number" placeholder="Phone Number" required>
            </div>

            <div class="form-group">
                <i class="fa-solid fa-graduation-cap"></i>
                <select name="selected_program" required>
                    <option value="" disabled selected>Select Program</option>
                    <option value="B.E. EEE (Full Time)">B.E. EEE (Full Time)</option>
                    <option value="B.E. EEE (Part Time)">B.E. EEE (Part Time)</option>
                    <option value="M.E. Power Systems (Full Time)">M.E. Power Systems (Full Time)</option>
                    <option value="M.E. Power Systems (Part Time)">M.E. Power Systems (Part Time)</option>
                    <option value="Ph.D. EEE">Ph.D. EEE</option>
                </select>
            </div>

            <div class="form-group">
                <i class="fa-solid fa-message"></i>
                <textarea name="message" id="message" placeholder="Your Message (Optional)"></textarea>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">
                <span class="btn-text">Submit Application <i class="fa-solid fa-paper-plane"></i></span>
                <div class="spinner"></div>
            </button>
        </form>

        <div id="status"></div>
    </div>

    <script>
        const form = document.getElementById('contact-form');
        const btn = document.getElementById('submit-btn');
        const status = document.getElementById('status');

        form.addEventListener('submit', function (event) {
            event.preventDefault();

            // Call the global handler from email.js
            if (typeof window.handleAdmissionSubmission === 'function') {
                window.handleAdmissionSubmission(form, status, btn);
            } else {
                console.error('Submission handler not found!');
                alert('Submission logic is loading... please try again in a moment.');
            }
        });
    </script>

</body>

</html>
